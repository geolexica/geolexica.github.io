name: deploy

on:
  push:
    branches:
      - main
      - staging
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

jobs:
  build:
    name: Build and deploy site
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://www.geolexica.org' || 'https://www-staging.geolexica.org' }}

    steps:
      - name: Checkout Glossarist Vocabulary Browser
        uses: actions/checkout@v4
        with:
          repository: glossarist/vocabulary-browser
          ref: main
          path: vocabulary-browser

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vocabulary-browser/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vocabulary-browser

      - name: Fetch datasets
        run: npm run fetch-datasets
        working-directory: vocabulary-browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GCR packages
        run: npm run build-gcr:all
        working-directory: vocabulary-browser

      - name: Generate data
        run: npm run generate-data && npm run generate-data
        working-directory: vocabulary-browser

      - name: Build edges
        run: node scripts/build-edges.js
        working-directory: vocabulary-browser

      - name: Build SPA
        run: npm run build
        working-directory: vocabulary-browser

      - name: Deploy to geolexica.org
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        run: |
          cd vocabulary-browser/dist
          aws s3 sync . s3://$S3_BUCKET_NAME --region=$AWS_REGION --delete --no-progress --exclude "*" --include "*.html" --content-type "text/html; charset=utf-8"
          aws s3 sync . s3://$S3_BUCKET_NAME --region=$AWS_REGION --delete --no-progress --exclude "*" --include "*.json" --content-type "text/json; charset=utf-8"
          aws s3 sync . s3://$S3_BUCKET_NAME --region=$AWS_REGION --delete --no-progress --exclude "*.html,*.json" --include "*"
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
