name: build_deploy

on:
  push:
    branches: [main]
  pull_request:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.geolexica.org
    steps:
      - name: Checkout this repo (for datasets.yml)
        uses: actions/checkout@v4

      - name: Checkout vocabulary-browser
        uses: actions/checkout@v4
        with:
          repository: glossarist/vocabulary-browser
          ref: main
          path: vocabulary-browser

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vocabulary-browser/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: vocabulary-browser

      - name: Copy datasets.yml
        run: cp datasets.yml vocabulary-browser/datasets.yml

      - name: Fetch datasets (download GCR packages)
        run: npm run fetch-datasets
        working-directory: vocabulary-browser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate data
        run: npm run generate-data && npm run generate-data
        working-directory: vocabulary-browser

      - name: Build edges
        run: node scripts/build-edges.js
        working-directory: vocabulary-browser

      - name: Build SPA
        run: npm run build
        working-directory: vocabulary-browser

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: vocabulary-browser/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
